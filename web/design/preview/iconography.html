<!doctype html>
<html><head><meta charset="utf-8"><title>Iconography</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 22px 28px; display: flex; flex-direction: column; gap: 12px; }
  .icons { display: flex; gap: 22px; align-items: center; flex-wrap: wrap; }
  .ic { width: 28px; height: 28px; color: var(--ocx-dark-blue); }
  .ic svg { width: 100%; height: 100%; }
  .meta { font-family: var(--font-body); font-size: 12px; color: var(--fg-muted); line-height: 1.55; }
  .flag {
    font-family: var(--font-display); font-weight: 700; font-size: 10px;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: #b97c0a;
    background: rgba(240,160,32,0.12);
    border: 1px solid rgba(240,160,32,0.4);
    border-radius: var(--r-sm);
    padding: 3px 8px;
    display: inline-block;
    margin-bottom: 4px;
  }
</style></head>
