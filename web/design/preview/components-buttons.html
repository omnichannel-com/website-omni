<!doctype html>
<html><head><meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 24px 28px; display: flex; flex-direction: column; gap: 14px; }
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .label { width: 96px; font-family: var(--font-display); font-weight: 700; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-muted); }

  button {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 14px;
    letter-spacing: -0.005em;
    border: 1px solid transparent;
    border-radius: var(--r-md);
    padding: 10px 18px;
    cursor: pointer;
    transition: all var(--dur-base) var(--ease-standard);
    display: inline-flex;
    align-items: center;
    gap: 8px;
    line-height: 1;
  }
  button svg {
    width: 16px; height: 16px;
    flex-shrink: 0;
    stroke-width: 1.25;
  }

  .btn-primary { background: var(--ocx-dark-blue); color: #fff; }
  .btn-primary:hover { background: var(--ocx-dark-blue-90); transform: translateY(-1px); box-shadow: var(--shadow-md); }

  .btn-accent { background: var(--ocx-bg-signature); color: #fff; box-shadow: var(--shadow-glow); }

  .btn-secondary { background: #fff; color: var(--fg-primary); border-color: var(--border-strong); }
  .btn-secondary:hover { border-color: var(--ocx-dark-blue); }

  .btn-ghost { background: transparent; color: var(--fg-primary); border-color: transparent; padding: 10px 12px; }
  .btn-ghost:hover { background: var(--ocx-dark-blue-08); }

  .btn-link { background: transparent; color: var(--ocx-bright-blue); border: 0; padding: 10px 4px; }
  .btn-link:hover { text-decoration: underline; }

  .btn-sm { padding: 7px 12px; font-size: 12px; }
  .btn-sm svg { width: 14px; height: 14px; }

  .voice {
    margin-top: 4px;
    font-family: var(--font-body); font-size: 11px;
    color: var(--fg-muted); line-height: 1.55;
  }
  .voice b { font-family: var(--font-display); font-weight: 800; color: var(--fg-primary); }
</style></head>
<body>
  <div class="row">
    <div class="label">Primary</div>
    <button class="btn-primary">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      Get started
    </button>
    <button class="btn-accent">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      Resolve conversation
    </button>
    <button class="btn-primary btn-sm">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      Save draft
    </button>
  </div>
  <div class="row">
    <div class="label">Secondary</div>
    <button class="btn-secondary">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
      Learn more
    </button>
    <button class="btn-ghost">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      Cancel
    </button>
    <button class="btn-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>
      Open inbox
    </button>
  </div>

  <div class="voice">
    <b>Voice.</b> Sentence case. One verb, one object: “Resolve conversation,” not “Resolve your conversations now!”. No exclamation, no emoji, no em-dash. <b>Icons always lead</b> at 16px (14px small), 1.25 stroke, <code>currentColor</code> — same gap, same alignment, every variant.
  </div>
</body></html>
