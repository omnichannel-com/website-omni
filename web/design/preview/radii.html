<!doctype html>
<html><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 24px 28px; }
  .row { display: flex; gap: 18px; align-items: flex-end; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box {
    background: var(--ocx-dark-blue-08);
    border: 1px solid var(--ocx-dark-blue-12);
    width: 80px; height: 80px;
  }
  .tok { font-family: var(--font-mono); font-size: 11px; color: var(--fg); }
  .px { font-family: var(--font-mono); font-size: 10px; color: var(--fg-subtle); }
  .pill { width: 130px; }
</style></head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:4px"></div><div class="tok">--r-sm</div><div class="px">4</div></div>
    <div class="item"><div class="box" style="border-radius:8px"></div><div class="tok">--r-md</div><div class="px">8</div></div>
    <div class="item"><div class="box" style="border-radius:14px"></div><div class="tok">--r-lg</div><div class="px">14</div></div>
    <div class="item"><div class="box" style="border-radius:22px"></div><div class="tok">--r-xl</div><div class="px">22</div></div>
    <div class="item"><div class="box pill" style="border-radius:999px;height:42px"></div><div class="tok">--r-pill</div><div class="px">999</div></div>
  </div>
</body></html>
