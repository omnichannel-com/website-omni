<!doctype html>
<html><head><meta charset="utf-8"><title>Body · Oxygen</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 24px 28px; }
  .specimen {
    font-family: var(--font-body); font-weight: 400; font-size: 16px; line-height: 1.6; color: var(--fg);
    max-width: 640px; margin-bottom: 14px;
  }
  .specimen em { font-style: italic; color: var(--fg-muted); }
  .specimen strong { font-weight: 700; }
  .meta-row { display: flex; gap: 24px; align-items: baseline; }
  .name { font-family: var(--font-display); font-weight: 800; font-size: 14px; color: var(--fg-primary); }
  .role { font-family: var(--font-body); font-size: 12px; color: var(--fg-muted); }
  .weights { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); margin-left: auto; }
</style></head>
<body>
  <div class="specimen">
    Resolve every conversation in <strong>one pane</strong>: email, chat, voice, and social, threaded together so your team can answer in the channel the customer chose. <em>Built for teams who respond fast and care deeply.</em>
  </div>
  <div class="meta-row">
    <div class="name">Oxygen</div>
    <div class="role">Body copy &amp; longform. Italic + bold to break sections.</div>
    <div class="weights">300 · 400 · 700</div>
  </div>
</body></html>
