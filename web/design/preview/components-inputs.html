<!doctype html>
<html><head><meta charset="utf-8"><title>Inputs</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 22px 28px; display: flex; flex-direction: column; gap: 12px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .label { font-family: var(--font-display); font-weight: 700; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-muted); }
  .input {
    font-family: var(--font-body); font-size: 14px;
    padding: 10px 14px;
    border: 1px solid var(--border-strong);
    border-radius: var(--r-md);
    background: #fff;
    color: var(--fg);
    outline: none;
    transition: all var(--dur-base) var(--ease-standard);
    width: 100%;
  }
  .input:focus, .focused { border-color: var(--ocx-bright-blue); box-shadow: 0 0 0 3px rgba(0,113,188,0.18); }
  .helper { font-family: var(--font-body); font-size: 12px; color: var(--fg-muted); }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
</style></head>
<body>
  <div class="row">
    <div class="field">
      <div class="label">Email</div>
      <input class="input" value="ada@omnichannelcx.com">
    </div>
    <div class="field">
      <div class="label">Workspace</div>
      <input class="input focused" value="resolve-fast">
    </div>
  </div>
  <div class="field">
    <div class="label">Reply</div>
    <textarea class="input" rows="2" style="resize:vertical;font-family:var(--font-body)">Thanks for reaching out. We have an answer ready.</textarea>
    <div class="helper">Drafts auto-save every few seconds.</div>
  </div>
</body></html>
