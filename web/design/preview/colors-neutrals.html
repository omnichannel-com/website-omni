<!doctype html>
<html><head><meta charset="utf-8"><title>Neutrals</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 22px 28px; }
  .scale { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
  .sw { height: 84px; border-radius: var(--r-sm); padding: 8px; display: flex; flex-direction: column; justify-content: space-between; border: 1px solid transparent; }
  .sw .n { font-family: var(--font-display); font-weight: 700; font-size: 11px; }
  .sw .h { font-family: var(--font-mono); font-size: 9px; opacity: 0.7; }
  .light { color: var(--fg); border-color: var(--border); }
  .dark  { color: #fff; }
  .row-label { margin-bottom: 8px; font-family: var(--font-display); font-weight: 800; font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--fg-muted); }
</style></head>
<body>
  <div class="row-label">Neutral scale</div>
  <div class="scale">
    <div class="sw light" style="background:#ffffff"><div class="n">white</div><div class="h">#ffffff</div></div>
    <div class="sw light" style="background:#f6f6f8"><div class="n">grey-50</div><div class="h">#f6f6f8</div></div>
    <div class="sw light" style="background:#ececf1"><div class="n">grey-100</div><div class="h">#ececf1</div></div>
    <div class="sw light" style="background:#d8d8e0"><div class="n">grey-200</div><div class="h">#d8d8e0</div></div>
    <div class="sw light" style="background:#b8b8c4"><div class="n">grey-300</div><div class="h">#b8b8c4</div></div>
    <div class="sw dark" style="background:#575757"><div class="n">mid-grey</div><div class="h">#575757</div></div>
    <div class="sw dark" style="background:#000000"><div class="n">black</div><div class="h">#000000</div></div>
  </div>
</body></html>
