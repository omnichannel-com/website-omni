<!doctype html>
<html><head><meta charset="utf-8"><title>App icon</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 24px 32px; display: flex; align-items: center; gap: 20px; }
  .icons { display: flex; align-items: flex-end; gap: 16px; }
  .ic {
    background: transparent;
    border-radius: 22%;
    overflow: hidden;
    box-shadow: var(--shadow-md);
  }
  .ic img { display: block; width: 100%; height: 100%; }
  .s120 { width: 120px; height: 120px; border-radius: 28%; }
  .s72  { width: 72px;  height: 72px;  border-radius: 22%; }
  .s44  { width: 44px;  height: 44px;  border-radius: 12px; }
  .meta { flex: 1; }
  .meta .name { font-family: var(--font-display); font-weight: 800; font-size: 18px; letter-spacing: -0.01em; color: var(--fg-primary); margin-bottom: 6px; }
  .meta .desc { font-family: var(--font-body); font-size: 13px; color: var(--fg-muted); line-height: 1.5; }
</style></head>
<body>
  <div class="icons">
    <div class="ic s120"><img src="../assets/logo-icon-app.png" alt="app icon 120"></div>
    <div class="ic s72"><img src="../assets/logo-icon-app.png" alt="app icon 72"></div>
    <div class="ic s44"><img src="../assets/logo-icon-app.png" alt="app icon 44"></div>
  </div>
  <div class="meta">
    <div class="name">App icon</div>
    <div class="desc">Pre-composed white mark on the signature gradient square. Use for iOS/Android, desktop docks, and OS launchers; never re-create the gradient by hand.</div>
  </div>
</body></html>
