<!doctype html>
<html><head><meta charset="utf-8"><title>Brand colors</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 22px 28px; }
  .swatches { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
  .sw {
    border-radius: var(--r-md);
    height: 110px;
    padding: 14px;
    display: flex; flex-direction: column; justify-content: space-between;
    color: #fff;
    border: 1px solid transparent;
  }
  .sw .name { font-family: var(--font-display); font-weight: 700; font-size: 13px; letter-spacing: -0.01em; }
  .sw .meta { font-family: var(--font-mono); font-size: 10px; opacity: 0.85; line-height: 1.5; }
  .sw.light { color: var(--ocx-black); border-color: var(--border); }
  .a { background: var(--ocx-dark-blue); }
  .b { background: var(--ocx-mauve); }
  .c { background: var(--ocx-bright-blue); }
  .d { background: var(--ocx-mid-grey); }
  .e { background: var(--ocx-black); }
</style></head>
<body>
  <div class="swatches">
    <div class="sw a"><div class="name">Dark Blue</div><div class="meta">#1b1464<br>27 20 100<br>Primary</div></div>
    <div class="sw b"><div class="name">Mauve</div><div class="meta">#aa42dc<br>170 66 220<br>Accent</div></div>
    <div class="sw c"><div class="name">Bright Blue</div><div class="meta">#0071bc<br>0 113 188<br>Accent</div></div>
    <div class="sw d"><div class="name">Mid Grey</div><div class="meta">#575757<br>87 87 87<br>Muted fg</div></div>
    <div class="sw e"><div class="name">Black</div><div class="meta">#000000<br>0 0 0<br>Text</div></div>
  </div>
</body></html>
