<!doctype html>
<html><head><meta charset="utf-8"><title>Spacing scale</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 22px 28px; }
  .row { display: flex; align-items: center; gap: 14px; padding: 5px 0; }
  .tok { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); width: 60px; }
  .bar { background: var(--ocx-dark-blue); height: 14px; border-radius: 3px; }
  .px { font-family: var(--font-mono); font-size: 11px; color: var(--fg-subtle); margin-left: auto; width: 50px; text-align: right; }
</style></head>
<body>
  <div class="row"><div class="tok">--sp-1</div><div class="bar" style="width:4px"></div><div class="px">4</div></div>
  <div class="row"><div class="tok">--sp-2</div><div class="bar" style="width:8px"></div><div class="px">8</div></div>
  <div class="row"><div class="tok">--sp-3</div><div class="bar" style="width:12px"></div><div class="px">12</div></div>
  <div class="row"><div class="tok">--sp-4</div><div class="bar" style="width:16px"></div><div class="px">16</div></div>
  <div class="row"><div class="tok">--sp-5</div><div class="bar" style="width:24px"></div><div class="px">24</div></div>
  <div class="row"><div class="tok">--sp-6</div><div class="bar" style="width:32px"></div><div class="px">32</div></div>
  <div class="row"><div class="tok">--sp-7</div><div class="bar" style="width:48px"></div><div class="px">48</div></div>
  <div class="row"><div class="tok">--sp-8</div><div class="bar" style="width:64px"></div><div class="px">64</div></div>
  <div class="row"><div class="tok">--sp-9</div><div class="bar" style="width:96px"></div><div class="px">96</div></div>
</body></html>
