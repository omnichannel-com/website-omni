<!doctype html>
<html><head><meta charset="utf-8"><title>Logo don'ts</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 22px 28px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .item { display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .panel {
    width: 100%; height: 90px;
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    display: flex; align-items: center; justify-content: center;
    padding: 10px;
    background: #fff;
    position: relative;
    overflow: hidden;
  }
  .panel img { max-width: 100%; max-height: 100%; object-fit: contain; }
  .x { position: absolute; top: 6px; right: 8px; font-family: var(--font-display); font-weight: 900; font-size: 18px; color: #d63b3b; }
  .squish img { transform: scaleX(0.55); }
  .rotate img { transform: rotate(18deg); }
  .recolor { background: #2eb872; }
  .small img { max-height: 22px; }
  .cap { font-family: var(--font-body); font-size: 11px; color: var(--fg-muted); text-align: center; }
</style></head>
<body>
  <div class="grid">
    <div class="item">
      <div class="panel squish"><span class="x">✕</span><img src="../assets/logo-full-color.png"></div>
      <div class="cap">Don't squish</div>
    </div>
    <div class="item">
      <div class="panel rotate"><span class="x">✕</span><img src="../assets/logo-full-color.png"></div>
      <div class="cap">Don't rotate</div>
    </div>
    <div class="item">
      <div class="panel recolor"><span class="x">✕</span><img src="../assets/logo-full-white.png"></div>
      <div class="cap">Don't recolor</div>
    </div>
    <div class="item">
      <div class="panel small"><span class="x">✕</span><img src="../assets/logo-full-color.png"></div>
      <div class="cap">Don't shrink &lt;175px</div>
    </div>
  </div>
</body></html>
