<!doctype html>
<html><head><meta charset="utf-8"><title>Logo · Full</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 28px 32px; display: flex; align-items: center; gap: 28px; }
  .logo-block {
    flex: 1;
    height: 110px;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    display: flex; align-items: center; justify-content: center;
    padding: 16px 24px;
  }
  .logo-block img { max-height: 56px; max-width: 100%; object-fit: contain; }
  .meta { flex: 0 0 200px; }
  .meta .name { font-family: var(--font-display); font-weight: 800; font-size: 18px; letter-spacing: -0.01em; color: var(--fg-primary); margin-bottom: 4px; }
  .meta .desc { font-family: var(--font-body); font-size: 13px; color: var(--fg-muted); line-height: 1.5; }
</style></head>
<body>
  <div class="meta">
    <div class="name">Full logo</div>
    <div class="desc">Icon + "omnichannel CX" wordmark. Lowercase <em>omnichannel</em>, uppercase <strong>CX</strong>. Min width 175px.</div>
  </div>
  <div class="logo-block"><img src="../assets/logo-full-color.png" alt="omnichannel CX logo"></div>
</body></html>
