<!doctype html>
<html><head><meta charset="utf-8"><title>Sub-head · Cormorant</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 24px 28px; }
  .specimen { font-family: var(--font-serif); font-style: italic; font-weight: 500; font-size: 56px; line-height: 1.05; color: var(--fg); margin-bottom: 12px; }
  .specimen .roman { font-style: normal; }
  .meta-row { display: flex; gap: 24px; align-items: baseline; }
  .name { font-family: var(--font-display); font-weight: 800; font-size: 14px; color: var(--fg-primary); }
  .role { font-family: var(--font-body); font-size: 12px; color: var(--fg-muted); }
  .weights { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); margin-left: auto; }
</style></head>
<body>
  <div class="specimen"><span class="roman">Aa</span> Bg <em>resolved.</em></div>
  <div class="meta-row">
    <div class="name">Cormorant</div>
    <div class="role">Sub-headings, often italic. Clean and well-styled.</div>
    <div class="weights">400 · 500 · 600</div>
  </div>
  <script src="_card.js"></script>
</body></html>
