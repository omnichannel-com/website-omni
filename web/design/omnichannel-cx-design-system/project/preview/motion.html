<!doctype html>
<html><head><meta charset="utf-8"><title>Motion</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 22px 28px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .panel { padding: 14px 16px; border: 1px solid var(--border); border-radius: var(--r-md); }
  .panel h4 { font-family: var(--font-display); font-weight: 800; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--fg-muted); margin-bottom: 10px; }
  .row { display: flex; justify-content: space-between; padding: 5px 0; font-family: var(--font-mono); font-size: 11px; }
  .row .k { color: var(--fg-primary); font-weight: 700; }
  .row .v { color: var(--fg-muted); }
  .demo { height: 24px; background: var(--bg-subtle); border-radius: 999px; position: relative; overflow: hidden; margin-top: 10px; }
  .ball { position: absolute; top: 4px; left: 4px; width: 16px; height: 16px; border-radius: 999px; background: var(--ocx-mauve); animation: slide 2.4s var(--ease-standard) infinite; }
  @keyframes slide { 0%,15% { left: 4px; } 50%,65% { left: calc(100% - 20px); } 100% { left: 4px; } }
</style></head>
<body>
  <div class="grid">
    <div class="panel">
      <h4>Duration</h4>
      <div class="row"><span class="k">--dur-fast</span><span class="v">140ms</span></div>
      <div class="row"><span class="k">--dur-base</span><span class="v">220ms</span></div>
      <div class="row"><span class="k">--dur-slow</span><span class="v">380ms</span></div>
    </div>
    <div class="panel">
      <h4>Easing</h4>
      <div class="row"><span class="k">standard</span><span class="v">cubic(.2,.8,.2,1)</span></div>
      <div class="row"><span class="k">emphasis</span><span class="v">cubic(.16,1,.3,1)</span></div>
      <div class="demo"><div class="ball"></div></div>
    </div>
  </div>
</body></html>
