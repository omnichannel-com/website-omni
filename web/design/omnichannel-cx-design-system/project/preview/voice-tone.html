<!doctype html>
<html><head><meta charset="utf-8"><title>Voice &amp; tone</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 22px 28px; display: flex; flex-direction: column; gap: 12px; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .panel { padding: 12px 14px; border-radius: var(--r-md); border: 1px solid var(--border); }
  .panel.good { border-color: rgba(46,184,114,0.4); background: rgba(46,184,114,0.04); }
  .panel.bad  { border-color: rgba(214,59,59,0.4); background: rgba(214,59,59,0.04); }
  .tag { font-family: var(--font-display); font-weight: 800; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 6px; }
  .good .tag { color: #1f8a5b; }
  .bad .tag  { color: #b03434; }
  .panel p { font-family: var(--font-body); font-size: 13px; line-height: 1.5; color: var(--fg); }
  .principles { display: flex; flex-wrap: wrap; gap: 6px; }
  .pill {
    font-family: var(--font-display); font-weight: 700; font-size: 11px;
    letter-spacing: 0.06em; text-transform: uppercase;
    padding: 4px 10px; border-radius: 999px;
    background: var(--bg-muted); color: var(--fg-primary);
  }
</style></head>
<body>
  <div class="principles">
    <span class="pill">Sentence case</span>
    <span class="pill">"You" not "users"</span>
    <span class="pill">No emoji</span>
    <span class="pill">No exclamation</span>
    <span class="pill">No em-dash</span>
    <span class="pill">Calm · confident</span>
  </div>
  <div class="row">
    <div class="panel good">
      <div class="tag">✓ ON-BRAND</div>
      <p>Resolve every conversation in one pane.</p>
    </div>
    <div class="panel bad">
      <div class="tag">✗ OFF-BRAND</div>
      <p>Resolve EVERY conversation, in JUST one pane! 🚀</p>
    </div>
  </div>
  <script src="_card.js"></script>
</body></html>
