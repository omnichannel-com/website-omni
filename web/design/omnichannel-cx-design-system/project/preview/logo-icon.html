<!doctype html>
<html><head><meta charset="utf-8"><title>Icon mark</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 24px 32px; display: flex; align-items: center; gap: 24px; }
  .panel {
    width: 130px; height: 130px;
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    display: flex; align-items: center; justify-content: center;
    padding: 12px;
    background: #fff;
  }
  .panel.dark { background: var(--ocx-dark-blue); border-color: transparent; }
  .panel img { max-width: 100%; max-height: 100%; object-fit: contain; }
  .meta { flex: 1; }
  .meta .name { font-family: var(--font-display); font-weight: 800; font-size: 18px; letter-spacing: -0.01em; color: var(--fg-primary); margin-bottom: 6px; }
  .meta .desc { font-family: var(--font-body); font-size: 13px; color: var(--fg-muted); line-height: 1.5; margin-bottom: 8px; }
  .meta .rule { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); }
</style></head>
<body>
  <div class="panel"><img src="../assets/logo-icon-large.png" alt="icon mark color"></div>
  <div class="panel dark"><img src="../assets/logo-icon-color.png" alt="icon mark on dark"></div>
  <div class="meta">
    <div class="name">Icon mark</div>
    <div class="desc">Interlaced heart-knot mark. Use stand-alone in app icons, favicons, and as a small badge.</div>
    <div class="rule">min size&nbsp;&nbsp;32px&nbsp;·&nbsp;custom 16px on request</div>
  </div>
</body></html>
