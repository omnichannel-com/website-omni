<!doctype html>
<html><head><meta charset="utf-8"><title>Neutrals</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 22px 28px; }
  .scale { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
  .sw { height: 92px; border-radius: var(--r-sm); padding: 10px; display: flex; flex-direction: column; justify-content: space-between; }
  .sw .n { font-family: var(--font-display); font-weight: 700; font-size: 12px; letter-spacing: 0.01em; }
  .sw .h { font-family: var(--font-mono); font-size: 10px; font-weight: 500; opacity: 0.82; }
  /* Swatches show FIXED palette colors, so their label ink is fixed to the
     swatch's own lightness — never the page theme (which would flip the text
     to near-white in dark mode and make it vanish on the pale chips). */
  .ink-dark  { color: #15104f; border: 1px solid rgba(21,16,79,0.14); }
  .ink-light { color: #ffffff; border: 1px solid transparent; }
  .row-label { margin-bottom: 8px; font-family: var(--font-display); font-weight: 800; font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--fg-muted); }
</style></head>
<body>
  <div class="row-label">Neutral scale</div>
  <div class="scale">
    <div class="sw ink-dark" style="background:#ffffff"><div class="n">white</div><div class="h">#ffffff</div></div>
    <div class="sw ink-dark" style="background:#f6f6f8"><div class="n">grey-50</div><div class="h">#f6f6f8</div></div>
    <div class="sw ink-dark" style="background:#ececf1"><div class="n">grey-100</div><div class="h">#ececf1</div></div>
    <div class="sw ink-dark" style="background:#d8d8e0"><div class="n">grey-200</div><div class="h">#d8d8e0</div></div>
    <div class="sw ink-dark" style="background:#b8b8c4"><div class="n">grey-300</div><div class="h">#b8b8c4</div></div>
    <div class="sw ink-light" style="background:#575757"><div class="n">mid-grey</div><div class="h">#575757</div></div>
    <div class="sw ink-light" style="background:#000000"><div class="n">black</div><div class="h">#000000</div></div>
  </div>
  <script src="_card.js"></script>
</body></html>
