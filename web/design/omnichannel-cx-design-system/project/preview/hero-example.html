<!doctype html>
<html><head><meta charset="utf-8"><title>Hero composition</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 0; width: 700px; height: 320px; }
  .hero {
    width: 100%; height: 100%;
    background: var(--ocx-bg-aurora);
    color: #fff;
    padding: 36px 40px;
    position: relative;
    overflow: hidden;
  }
  .content { position: relative; z-index: 1; max-width: 460px; }
  .eyebrow { font-family: var(--font-display); font-weight: 700; font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: rgba(255,255,255,0.7); margin-bottom: 14px; }
  h1 {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 48px;
    line-height: 1.0;
    letter-spacing: -0.025em;
    color: #fff;
    margin-bottom: 14px;
  }
  .sub { font-family: var(--font-serif); font-style: italic; font-weight: 500; font-size: 22px; line-height: 1.2; color: rgba(255,255,255,0.92); margin-bottom: 20px; }
  /* On an already-gradient hero, the CTA goes solid white with dark-blue text.
     Reserves the signature gradient for surfaces that don't already use it,
     and keeps the page "composed, not decorative." */
  .cta {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    line-height: 1;
    font-family: var(--font-display); font-weight: 700; font-size: 14px;
    background: #ffffff; color: var(--ocx-dark-blue);
    padding: 12px 22px;
    border-radius: var(--r-md);
    text-decoration: none;
    box-shadow: 0 12px 32px rgba(8, 6, 40, 0.35);
  }
  .cta svg { width: 16px; height: 16px; flex-shrink: 0; stroke-width: 1.25; }
  .logo { position: absolute; top: 28px; right: 34px; height: 28px; opacity: 0.9; z-index: 1; }
</style></head>
<body>
  <div class="hero">
    <img class="logo" src="../assets/logo-full-white.png" alt="omnichannel CX">
    <div class="content">
      <div class="eyebrow">PLATFORM</div>
      <h1>One inbox,<br>every channel.</h1>
      <div class="sub"><em>Composed under pressure. Built for teams who care deeply.</em></div>
      <a href="#" class="cta">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        Get started
      </a>
    </div>
  </div>
</body></html>
