<!doctype html>
<html><head><meta charset="utf-8"><title>Semantic tokens</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 22px 28px; }
  table { width: 100%; border-collapse: collapse; font-family: var(--font-mono); font-size: 12px; }
  th, td { text-align: left; padding: 7px 10px; border-bottom: 1px solid var(--border); }
  th { font-family: var(--font-display); font-weight: 700; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-subtle); }
  td.token { color: var(--fg-primary); font-weight: 700; }
  td.value { color: var(--fg-muted); }
  .chip { display: inline-block; width: 14px; height: 14px; border-radius: 4px; vertical-align: middle; margin-right: 8px; border: 1px solid var(--border); }
</style></head>
<body>
  <table>
    <thead><tr><th>Token</th><th>Resolves to</th><th>Use</th></tr></thead>
    <tbody>
      <tr><td class="token"><span class="chip" style="background:#fff"></span>--bg</td><td class="value">white</td><td class="value">Default surface</td></tr>
      <tr><td class="token"><span class="chip" style="background:#f6f6f8"></span>--bg-subtle</td><td class="value">grey-50</td><td class="value">Section / panel</td></tr>
      <tr><td class="token"><span class="chip" style="background:#1b1464"></span>--bg-inverse</td><td class="value">dark-blue</td><td class="value">Dark hero / footer</td></tr>
      <tr><td class="token"><span class="chip" style="background:#000"></span>--fg</td><td class="value">black</td><td class="value">Body text</td></tr>
      <tr><td class="token"><span class="chip" style="background:#575757"></span>--fg-muted</td><td class="value">mid-grey</td><td class="value">Secondary text</td></tr>
      <tr><td class="token"><span class="chip" style="background:#1b1464"></span>--fg-primary</td><td class="value">dark-blue</td><td class="value">Headings, primary CTA</td></tr>
      <tr><td class="token"><span class="chip" style="background:#0071bc"></span>--fg-link</td><td class="value">bright-blue</td><td class="value">Links</td></tr>
      <tr><td class="token"><span class="chip" style="background:#aa42dc"></span>--fg-accent</td><td class="value">mauve</td><td class="value">Highlight (sparingly)</td></tr>
    </tbody>
  </table>
</body></html>
