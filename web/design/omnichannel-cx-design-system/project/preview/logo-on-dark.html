<!doctype html>
<html><head><meta charset="utf-8"><title>Logo · Dark surface</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 28px 32px; display: flex; align-items: center; gap: 16px; }
  .panel {
    flex: 1; height: 110px;
    border-radius: var(--r-md);
    display: flex; align-items: center; justify-content: center;
    padding: 16px;
  }
  .panel img { max-height: 56px; max-width: 100%; object-fit: contain; }
  .dark { background: var(--ocx-dark-blue); }
  .grad { background: var(--ocx-gradient); }
  .black { background: var(--ocx-black); }
</style></head>
<body>
  <div class="panel dark"><img src="../assets/logo-full-white.png" alt="logo on dark blue"></div>
  <div class="panel grad"><img src="../assets/logo-full-white.png" alt="logo on gradient"></div>
  <div class="panel black"><img src="../assets/logo-full-white.png" alt="logo on black"></div>
</body></html>
